<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        @font-face { font-family: 'helv'; src: url('HelveticaNowDisplay.otf'); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: helv, 'Helvetica Neue', Arial, sans-serif;
            font-weight: 300;
            background: #fafaf8;
        }

        /* ── each spread is a fixed viewport slice on screen ── */
        .spread {
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* ── IMAGE HALF ── */
        .img-half {
            width: 50%;
            height: 100%;
            background: #000;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        /* the actual image — real <img> tag, sized with object-fit */
        .img-half img.main-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            padding: 2rem;
        }

        .caption {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            font-size: 0.7em;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 0.3em 0.6em;
            letter-spacing: 0.04em;
        }

        /* ── TEXT HALF ── */
        .text-half {
            width: 50%;
            height: 100%;
            flex-shrink: 0;
            background: #f2f1ee;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 3.5rem;
            position: relative;
        }

        .entry-num {
            position: absolute;
            top: 2.5rem;
            right: 3rem;
            font-size: 0.65em;
            letter-spacing: 0.2em;
            color: #aaa;
        }

        .text-top { display: flex; flex-direction: column; }

        .category {
            font-size: 0.65em;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 0.8em;
        }
        .category::before { content: '— '; }

        h1 {
            font-size: clamp(1.8rem, 3.5vw, 3.5rem);
            line-height: 0.92em;
            font-weight: 300;
            text-transform: uppercase;
            color: #111;
            margin-bottom: 1.5rem;
        }
        h1::after {
            content: '';
            display: block;
            width: 2rem;
            height: 1px;
            background: #111;
            margin-top: 1rem;
        }

        .body-text {
            font-size: 0.85em;
            line-height: 1.75em;
            color: #555;
        }

        .text-bottom {
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6em;
        }

        .entry-link {
            font-size: 0.7em;
            color: #999;
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 0.4em; }
        .tag {
            font-size: 0.62em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #666;
            border: 1px solid rgba(0,0,0,0.15);
            padding: 0.2em 0.6em;
        }

        /* ── COVER ── */
        .cover {
            width: 100vw;
            height: 100vh;
            background: #111;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            position: relative;
        }
        .cover-grad {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%);
        }
        .cover-text {
            position: relative;
            z-index: 1;
            padding: 3rem 3.5rem;
            color: white;
            width: 100%;
        }
        .cover-eyebrow {
            font-size: 0.65em;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.8em;
        }
        .cover h1 {
            font-size: clamp(3rem, 7vw, 6rem);
            line-height: 0.88em;
            font-weight: 300;
            text-transform: uppercase;
            color: white;
            margin-bottom: 1.5rem;
        }
        .cover h1::after { display: none; }
        .cover-sub {
            font-size: 0.8em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
        }
        .cover-date {
            font-size: 0.7em;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.4);
            margin-top: 0.3em;
        }

        /* ══════════════════════════════════════
           PRINT — this is where it all counts
        ══════════════════════════════════════ */
        @media print {
            @page { size: 297mm 210mm; margin: 0; }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            html, body {
                width: 297mm;
                margin: 0; padding: 0;
                background: #fafaf8;
            }

            /* every spread = exactly one A4 landscape page */
            .spread, .cover {
                width: 297mm !important;
                height: 210mm !important;
                min-height: 210mm !important;
                max-height: 210mm !important;
                page-break-after: always !important;
                break-after: page !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                overflow: hidden !important;
                display: flex !important;
            }

            .img-half {
                width: 148.5mm !important;
                min-width: 148.5mm !important;
                height: 210mm !important;
                background: #000 !important;
                flex-shrink: 0 !important;
                overflow: hidden !important;
                position: relative !important;
            }

            /* KEY: real <img> tag prints reliably */
            .img-half img.main-img {
                display: block !important;
                width: 100% !important;
                height: 100% !important;
                object-fit: contain !important;
                object-position: top center !important;
                padding: 1cm !important;
            }

            .text-half {
                width: 148.5mm !important;
                min-width: 148.5mm !important;
                height: 210mm !important;
                padding: 1.8cm 1.5cm !important;
                background: #f2f1ee !important;
                flex-shrink: 0 !important;
            }

            h1 { font-size: 2.8em !important; }
            .body-text { font-size: 0.75em !important; }

            .cover {
                background-size: cover !important;
                background-position: center top !important;
                align-items: flex-end !important;
            }

            .cover h1 { font-size: 4.5em !important; color: white !important; }
            .cover-eyebrow, .cover-sub, .cover-date { color: rgba(255,255,255,0.7) !important; }
            .cover-grad {
                position: absolute !important;
                inset: 0 !important;
                background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%) !important;
            }
        }
    </style>
</head>
<body>

    <!-- COVER — edit directly -->
    <div class="cover" style="background-image: url('Background.png');">
        <div class="cover-grad"></div>
        <div class="cover-text">
            <div class="cover-eyebrow">INTERACTIVE MEDIA</div>
            <h1>RESEARCH<br>JOURNAL</h1>
            <div class="cover-sub">Zimai Gao &nbsp;·&nbsp; 1617186 / GDES30008</div>
            <div class="cover-date">Sem 1, 2026 <br> Background Image Source: https://au.pinterest.com/pin/138415388541387611/</div>
        </div>
    </div>

    <script>
        var journalReady = false;

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                if (journalReady) {
                    doPrint();
                } else {
                    var t = setInterval(function() {
                        if (journalReady) { clearInterval(t); doPrint(); }
                    }, 150);
                }
            }
        });

        function doPrint() {
            setTimeout(window.print.bind(window), 500);
        }

        $(document).ready(function() {
            Papa.parse('ResearchJournal.csv', {
                download: true,
                header: true,
                complete: function(results) {
                    var rows = results.data.filter(function(r) {
                        return r['Title'] && r['Title'].trim() !== '';
                    });

                    var entryNum = 1;

                    rows.forEach(function(row) {
                        var layoutRight = (row['Layout'] || '').trim().toLowerCase() === 'right';
                        var num = String(entryNum++).padStart(2, '0');

                        // ── image half ──
                        var imgHalf = $('<div class="img-half">');
                        var img = $('<img class="main-img">').attr('src', row['ImageSrc']).attr('alt', row['Caption'] || '');
                        imgHalf.append(img);
                        if (row['Caption']) {
                            imgHalf.append($('<div class="caption">').text(row['Caption']));
                        }

                        // ── text half ──
                        var textHalf = $('<div class="text-half">');
                        textHalf.append($('<div class="entry-num">').text(num));

                        var textTop = $('<div class="text-top">');
                        if (row['Description']) textTop.append($('<div class="category">').text(row['Description']));
                        textTop.append($('<h1>').text(row['Title']));
                        if (row['BodyText']) textTop.append($('<div class="body-text">').text(row['BodyText']));
                        textHalf.append(textTop);

                        var textBottom = $('<div class="text-bottom">');
                        if (row['Link']) textBottom.append($('<a class="entry-link">').attr('href', row['Link']).text(row['Link']));
                        var tags = $('<div class="tags">');
                        (row['Keywords'] || '').split(',').forEach(function(k) {
                            k = k.trim();
                            if (k) tags.append($('<span class="tag">').text(k));
                        });
                        textBottom.append(tags);
                        textHalf.append(textBottom);

                        var spread = $('<div class="spread">');
                        spread.append(layoutRight ? [textHalf, imgHalf] : [imgHalf, textHalf]);
                        $('body').append(spread);
                    });

                    journalReady = true;
                }
            });
        });
    </script>
                <style>
            .workbook-back {
                position: fixed;
                top: 22px;
                left: 22px;
                z-index: 9999;
                font-family: 'Georgia', serif;
                font-size: 0.82rem;
                font-style: italic;
                letter-spacing: 0.04em;
                color: #1F1A1A;
                text-decoration: none;
                opacity: 0.5;
                transition: opacity 0.2s;
                /* Only show when referred from your workbook */
                display: none;
            }
            .workbook-back:hover { opacity: 1; }
            </style>

            <a class="workbook-back" id="workbook-back" href="#">← workbook b</a>

            <script>
            // Only show the back button if the user came from your workbook
            const LIBRARY_URL = 'https://wheatzzz.github.io/workbookb/library.html';
            const btn = document.getElementById('workbook-back');
            const ref = document.referrer;

            if (ref && ref.includes('wheatzzz.github.io/workbookb')) {
                btn.href = LIBRARY_URL;
                btn.style.display = 'block';
            }
            </script>
</body>
</html>
